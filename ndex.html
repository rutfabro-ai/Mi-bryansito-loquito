<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti ❤️</title>
    <style>
        body { margin: 0; padding: 0; background-image: url('fondo_universo.png'); background-size: cover; background-position: center; background-repeat: no-repeat; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; color: white; box-sizing: border-box; }
        
        /* Burbuja de Texto Superior */
        .chat-bubble { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); background-color: rgba(30, 30, 30, 0.9); border-radius: 25px; padding: 15px 25px; max-width: 80%; text-align: center; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); z-index: 10; border: 1px solid rgba(255, 255, 255, 0.1); }
        .chat-text { margin: 0; font-size: 1.1rem; line-height: 1.4; font-weight: 500; text-shadow: 0 0 5px rgba(255, 255, 255, 0.5); }
        .heart-emoji { font-size: 1.2rem; }

        /* Reproductor de Música Inferior */
        .media-player { position: fixed; bottom: 5%; left: 50%; transform: translateX(-50%); background-color: rgba(20, 20, 20, 0.85); border-radius: 18px; width: 90%; max-width: 400px; padding: 15px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.6); z-index: 10; box-sizing: border-box; }
        .play-pause-btn { background: none; border: none; font-size: 1.8rem; color: #42a5f5; cursor: pointer; padding: 0; margin-right: 15px; }
        .song-details { flex-grow: 1; text-align: left; }
        .song-title { font-size: 1rem; font-weight: 600; margin-bottom: 3px; }
        .song-creator { font-size: 0.9rem; color: #aaa; }
        .upload-btn-mock { background-color: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.7); border-radius: 12px; padding: 8px 15px; font-size: 0.9rem; border: none; cursor: not-allowed; opacity: 0.7; }

        /* Elemento de audio real (oculto) */
        audio { display: none; }
    </style>
</head>
<body>
    
    <div class="chat-bubble">
        <p class="chat-text">Te Amo Muchote<br>Mis Ojitos Brillantes <span class="heart-emoji">💛</span></p>
    </div>

    <div class="media-player">
        <button class="play-pause-btn" id="playBtn">⏸️</button>
        <div class="song-details">
            <p class="song-title">cancion.mp3</p>
            <p class="song-creator">Detalles Mr💙🌹❤️ (Reproductor Mr”)</p>
        </div>
        <button class="upload-btn-mock">Elegir canción</button>
    </div>

    <audio id="audioElement" loop>
        <source src="cancion.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('audioElement');
        const playBtn = document.getElementById('playBtn');

        playBtn.addEventListener('click', () => {
            if (audio.paused) { audio.play(); playBtn.textContent = '⏸️'; /* Pausa */ }
            else { audio.pause(); playBtn.textContent = '▶️'; /* Reproducir */ }
        });
    </script>
</body>
</html>
